<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Bot Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f0f2f5; color: #333; }
        header { background: #128C7E; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; }
        .container { display: flex; height: calc(100vh - 60px); }
        .sidebar { width: 250px; background: white; padding: 20px; border-right: 1px solid #ddd; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #qr-code { width: 250px; height: 250px; background: #eee; margin: 0 auto; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #666; }
        .status { padding: 10px; border-radius: 5px; text-align: center; font-weight: bold; }
        .online { background: #dcf8c6; color: #128C7E; }
        button { background: #128C7E; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <div class="logo">🤖 WhatsBot Server</div>
    </header>
    <div class="container">
        <div class="sidebar">
            <h3>Mis Bots</h3>
            <ul>
                <li>Bot Principal - <span class="status online">Activo</span></li>
            </ul>
            <button onclick="connectBot()">Conectar Nuevo Bot</button>
        </div>
        <div class="main-content">
            <div class="card">
                <h2>Estado del Bot</h2>
                <div class="status online">✅ Conectado</div>
                <p>Número: +1234567890</p>
            </div>
            
            <div class="card">
                <h2>Código QR para Conexión</h2>
                <div id="qr-code">Escanea este QR con WhatsApp Web</div>
            </div>
            
            <div class="card">
                <h2>Últimos Mensajes</h2>
                <table style="width:100%; border-collapse: collapse;">
                    <tr><th>De</th><th>Mensaje</th><th>Hora</th></tr>
                    <tr><td>+987654321</td><td>Hola, ¿cómo estás?</td><td>14:30</td></tr>
                </table>
            </div>
        </div>
    </div>

    <script>
        function connectBot() {
            alert("Simulando conexión... En un servidor real conecta con Baileys, Evolution API, etc.");
        }
    </script>
</body>
</html>
